  <!-- Text: LM FLOW (light theme — fundo claro) -->
  <text x="148" y="86" font-family="'Poppins', system-ui, sans-serif" font-weight="700" font-size="44" letter-spacing="2" fill="#0D0D0D">LM</text>
  <text x="220" y="86" font-family="'Poppins', system-ui, sans-serif" font-weight="700" font-size="44" letter-spacing="2" fill="url(#lmFlowTextL)">FLOW</text>
