<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 140" fill="none">
  <defs>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9333EA"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="purpleGradDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="goldGradKey" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="50%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>

  <!-- Buildings (background) -->
  <!-- Tall purple back-left -->
  <rect x="42" y="22" width="14" height="58" fill="url(#purpleGrad)"/>
  <!-- Gold center-front building (tallest) -->
  <rect x="58" y="14" width="16" height="66" fill="url(#goldGrad)"/>
  <!-- Purple right building -->
  <rect x="76" y="20" width="14" height="60" fill="url(#purpleGradDark)"/>
  <!-- Small back-right purple -->
  <rect x="92" y="30" width="12" height="50" fill="url(#purpleGrad)"/>

  <!-- House roof (V-shape over base) -->
  <path d="M30 84 L72 50 L114 84 Z" fill="url(#purpleGrad)"/>
  <!-- House body -->
  <rect x="42" y="80" width="60" height="20" fill="url(#purpleGradDark)"/>
  <!-- Window (4 panes) -->
  <rect x="64" y="84" width="16" height="14" fill="#FBBF24"/>
  <line x1="72" y1="84" x2="72" y2="98" stroke="#1F1F1F" stroke-width="1.2"/>
  <line x1="64" y1="91" x2="80" y2="91" stroke="#1F1F1F" stroke-width="1.2"/>

  <!-- Key -->
  <!-- Key head (circle outline) -->
  <circle cx="28" cy="108" r="13" fill="none" stroke="url(#goldGradKey)" stroke-width="6"/>
  <!-- Key shaft -->
  <rect x="40" y="105" width="68" height="6" fill="url(#goldGradKey)"/>
  <!-- Key teeth -->
  <rect x="96" y="111" width="6" height="9" fill="url(#goldGradKey)"/>
  <rect x="104" y="111" width="6" height="6" fill="url(#goldGradKey)"/>

  <!-- Text: CHAVE FLOW -->
  <text x="148" y="86" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif" font-weight="700" font-size="44" letter-spacing="2" fill="#FFFFFF">CHAVE</text>
  <text x="318" y="86" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif" font-weight="700" font-size="44" letter-spacing="2" fill="url(#goldGrad)">FLOW</text>
</svg>
