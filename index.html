<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SEO: app/CRM/landings NUNCA indexados (padrão fechado). Só os portais
         imobiliários (app Next.js separado) serão indexáveis, tratado depois. -->
    <meta name="robots" content="noindex, nofollow" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Ícones -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LM Flow" />

    <!-- Android / geral -->
    <meta name="theme-color" content="#7c3aed" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="LM Flow" />

    <meta name="description" content="LM Flow — CRM imobiliário com WhatsApp, pipeline e automação." />
    <title>LM Flow</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
